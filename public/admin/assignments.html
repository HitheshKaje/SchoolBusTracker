<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Assignments - RouteSense</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="/js/tailwind.config.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="bg-gray-50 flex">
  <main id="main-content" class="md:ml-64 flex-1 min-h-screen flex flex-col w-full md:w-auto overflow-x-hidden">
    <div class="p-4 sm:p-6 md:p-8 flex-1 w-full max-w-full">
      <div class="flex flex-col sm:flex-row sm:justify-between sm:items-center mb-6 space-y-4 sm:space-y-0">
        <div>
          <h1 class="text-2xl font-bold text-gray-900">Assignments</h1>
          <p class="text-sm text-gray-500 mt-1">Assign drivers to buses, buses to routes, etc.</p>
        </div>
      </div>
      
      <div class="bg-white p-6 rounded-2xl shadow-soft border border-gray-100 max-w-2xl mb-8">
        <form id="assignmentForm" class="space-y-6">
          <div>
            <label class="block text-sm font-medium text-gray-700">Assignment Type</label>
            <select id="assignType" class="mt-1 block w-full pl-3 pr-10 py-2 text-base border-gray-300 focus:outline-none focus:ring-primary-500 focus:border-primary-500 sm:text-sm rounded-md border">
              <option value="" disabled selected>Select Assignment Type</option>
              <option value="driverToBus">Driver ➜ Bus</option>
              <option value="busToRoute">Bus ➜ Route</option>
              <option value="studentToBus">Student ➜ Bus</option>
              <option value="parentToStudent">Parent ➜ Student</option>
            </select>
          </div>
          
          <div id="loadingIndicator" class="hidden text-sm text-primary-600 font-medium animate-pulse">Loading data...</div>

          <div id="sourceTargetContainer" class="hidden space-y-6">
            <div>
              <label id="sourceLabel" class="block text-sm font-medium text-gray-700">Source</label>
              <select id="sourceId" class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm py-2 px-3 focus:outline-none focus:ring-primary-500 focus:border-primary-500 sm:text-sm">
                <option value="" disabled selected>Select Source</option>
              </select>
            </div>
            
            <div>
              <label id="targetLabel" class="block text-sm font-medium text-gray-700">Target</label>
              <select id="targetId" class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm py-2 px-3 focus:outline-none focus:ring-primary-500 focus:border-primary-500 sm:text-sm">
                <option value="" disabled selected>Select Target</option>
              </select>
            </div>
            
            <button type="submit" class="w-full flex justify-center py-2 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-primary-600 hover:bg-primary-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary-500">
              Submit Assignment
            </button>
          </div>
          
          <div id="assignMessage" class="mt-2 text-sm hidden"></div>
        </form>
      </div>

      <!-- Current Assignments Table -->
      <div class="bg-white rounded-2xl shadow-soft border border-gray-100 overflow-hidden">
        <div class="px-6 py-5 border-b border-gray-100 flex justify-between items-center bg-gray-50/50">
          <h3 class="text-lg font-semibold text-gray-900">Current Assignments</h3>
        </div>
        <div class="overflow-x-auto">
          <div class="overflow-x-auto w-full">
          <table class="min-w-full divide-y divide-gray-200">
            <thead class="bg-gray-50">
              <tr>
                <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Assignment Type</th>
                <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Source</th>
                <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Target</th>
                <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Status</th>
                <th scope="col" class="px-6 py-3 text-right text-xs font-medium text-gray-500 uppercase tracking-wider">Actions</th>
              </tr>
            </thead>
            <tbody id="assignmentsTableBody" class="bg-white divide-y divide-gray-200">
              <tr>
                <td colspan="5" class="px-6 py-4 text-center text-sm text-gray-500">Loading assignments...</td>
              </tr>
            </tbody>
          </table>
        </div>
        </div>
      </div>

    </div>
  </main>
  <script src="/admin/layout.js"></script>
  <script src="/js/admin.js"></script>
  <script src="/js/assignments.js"></script>
</body>
</html>
