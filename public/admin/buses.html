<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manage Buses - RouteSense</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="/js/tailwind.config.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="bg-gray-50 flex">
  <main id="main-content" class="md:ml-64 flex-1 min-h-screen flex flex-col w-full md:w-auto overflow-x-hidden">
    <div class="p-4 sm:p-6 md:p-8 flex-1 w-full max-w-full">
      <div class="flex flex-col sm:flex-row sm:justify-between sm:items-center mb-6 space-y-4 sm:space-y-0">
        <div>
          <h1 class="text-2xl font-bold text-gray-900">Bus Management</h1>
          <p class="text-sm text-gray-500 mt-1">Manage fleet and assignments.</p>
        </div>
        <div class="flex space-x-3">
          <button id="addBusBtn" class="px-4 py-2 bg-primary-600 text-white rounded-lg font-medium hover:bg-primary-700 transition-colors shadow-sm">Add Bus</button>
        </div>
      </div>
      <div class="bg-white p-4 rounded-t-2xl border-b border-gray-100 shadow-soft flex items-center justify-between">
        <div class="relative w-64">
          <input type="text" id="searchInput" placeholder="Search buses..." class="w-full pl-10 pr-4 py-2 rounded-lg border border-gray-200 focus:outline-none focus:ring-2 focus:ring-primary-500 focus:border-primary-500 transition-shadow">
          <svg class="w-5 h-5 text-gray-400 absolute left-3 top-2.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
        </div>
      </div>
      <div class="bg-white rounded-b-2xl shadow-soft overflow-hidden border border-t-0 border-gray-100">
        <div class="overflow-x-auto w-full">
          <table class="min-w-full divide-y divide-gray-200">
          <thead class="bg-gray-50">
            <tr>
              <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Registration</th>
              <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Capacity</th>
              <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Assigned Driver</th>
              <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Status</th>
              <th scope="col" class="px-6 py-3 text-right text-xs font-medium text-gray-500 uppercase tracking-wider">Actions</th>
            </tr>
          </thead>
          <tbody id="tableBody" class="bg-white divide-y divide-gray-200"></tbody>
        </table>
        </div>
        <div class="bg-white px-4 py-3 border-t border-gray-200 flex items-center justify-between sm:px-6">
          <div class="text-sm text-gray-700" id="paginationInfo">Loading...</div>
          <div class="flex space-x-2">
            <button id="prevPageBtn" class="px-3 py-1 border border-gray-300 rounded text-gray-600 hover:bg-gray-50" disabled>Previous</button>
            <button id="nextPageBtn" class="px-3 py-1 border border-gray-300 rounded text-gray-600 hover:bg-gray-50" disabled>Next</button>
          </div>
        </div>
      </div>
    </div>

    <!-- Modal Form -->
    <div id="crudModal" class="hidden fixed inset-0 z-50 overflow-y-auto bg-gray-900 bg-opacity-50 flex items-center justify-center">
      <div class="bg-white rounded-xl shadow-lg w-full max-w-md mx-4 sm:mx-auto p-6">
        <div class="flex justify-between items-center mb-4">
          <h2 id="modalTitle" class="text-xl font-bold text-gray-900">Add Bus</h2>
          <button id="closeModalBtn" class="text-gray-400 hover:text-gray-600">&times;</button>
        </div>
        <form id="crudForm" class="space-y-4">
          <div>
            <label class="block text-sm font-medium text-gray-700">Registration Number</label>
            <input type="text" name="registrationNumber" required class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm py-2 px-3 focus:outline-none focus:ring-primary-500 focus:border-primary-500">
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700">Capacity</label>
            <input type="number" name="capacity" required class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm py-2 px-3 focus:outline-none focus:ring-primary-500 focus:border-primary-500">
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700">Model</label>
            <input type="text" name="model" class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm py-2 px-3 focus:outline-none focus:ring-primary-500 focus:border-primary-500">
          </div>
          <div class="flex justify-end space-x-3 mt-6">
            <button type="button" id="cancelModalBtn" class="px-4 py-2 border border-gray-300 rounded-md text-gray-700 hover:bg-gray-50">Cancel</button>
            <button type="submit" class="px-4 py-2 bg-primary-600 text-white rounded-md hover:bg-primary-700">Save</button>
          </div>
        </form>
      </div>
    </div>

  </main>
  <script src="/admin/layout.js"></script>
  <script src="/js/admin.js"></script>
  <script>
    let currentPage = 1;
    let currentSearch = '';

    const columns = [
      { key: 'registrationNumber', format: (val, row) => `<div class="font-bold text-gray-900">${val}</div><div class="text-xs text-gray-500">Model: ${row.model || 'N/A'}</div>` },
      { key: 'capacity' },
      { key: 'driver.user', format: (val, row) => row.driver && row.driver.user ? 'Assigned' : 'Unassigned' }, // Would need deep population for name
      { key: 'status', format: (val) => `<span class="px-2 inline-flex text-xs leading-5 font-semibold rounded-full ${val === 'active' ? 'bg-green-100 text-green-800' : 'bg-red-100 text-red-800'}">${val}</span>` }
    ];

    const loadData = async () => {
      const url = `/api/buses?page=${currentPage}&limit=10${currentSearch ? '&search=' + currentSearch : ''}`;
      const res = await apiFetch(url);
      if (res && res.data) {
        renderTable(res.data, columns, 'tableBody');
        const { total, page, limit } = res.pagination;
        document.getElementById('paginationInfo').innerText = `Showing ${(page-1)*limit + 1} to ${Math.min(page*limit, total)} of ${total} results`;
        document.getElementById('prevPageBtn').disabled = page <= 1;
        document.getElementById('nextPageBtn').disabled = page * limit >= total;
      }
    };

    document.addEventListener('DOMContentLoaded', () => {
      loadData();
      const searchInput = document.getElementById('searchInput');
      let timeout = null;
      searchInput.addEventListener('input', (e) => {
        clearTimeout(timeout);
        timeout = setTimeout(() => { currentSearch = e.target.value; currentPage = 1; loadData(); }, 500);
      });
      document.getElementById('prevPageBtn').addEventListener('click', () => { if (currentPage > 1) { currentPage--; loadData(); } });
      document.getElementById('nextPageBtn').addEventListener('click', () => { currentPage++; loadData(); });

      // Add Button
      document.getElementById('addBusBtn').addEventListener('click', () => {
        document.getElementById('crudModal').classList.remove('hidden');
        document.getElementById('modalTitle').innerText = 'Add Bus';
      });

      // Form Submit (Create/Update)
      document.getElementById('crudForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const formData = new FormData(e.target);
        const data = Object.fromEntries(formData.entries());
        const editId = e.target.dataset.editId;
        const method = editId ? 'PUT' : 'POST';
        const url = editId ? `/api/buses/${editId}` : '/api/buses';

        const res = await apiFetch(url, {
          method,
          body: JSON.stringify(data)
        });

        if (res && res.success) {
          document.getElementById('cancelModalBtn').click();
          loadData();
        } else {
          alert(res ? res.message : 'Error saving bus');
        }
      });
    });

    // Global edit hook
    window.openEditModal = async (id) => {
      const res = await apiFetch(`/api/buses/${id}`);
      if (res && res.data) {
        const form = document.getElementById('crudForm');
        form.dataset.editId = id;
        document.getElementById('modalTitle').innerText = 'Edit Bus';
        
        Object.keys(res.data).forEach(key => {
          const input = form.elements[key];
          if (input) input.value = res.data[key];
        });
        
        document.getElementById('crudModal').classList.remove('hidden');
      }
    };
  </script>
</body>
</html>
