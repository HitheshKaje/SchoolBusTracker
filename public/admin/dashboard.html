<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard - RouteSense</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="/js/tailwind.config.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="bg-gray-50 flex">

  <!-- Sidebar injected by layout.js -->

  <main id="main-content" class="ml-64 flex-1 min-h-screen flex flex-col">
    <!-- Topbar injected by layout.js -->
    
    <div class="p-8 flex-1">
      <div class="flex justify-between items-center mb-8">
        <div>
          <h1 class="text-2xl font-bold text-gray-900">Dashboard Overview</h1>
          <p class="text-sm text-gray-500 mt-1">Real-time statistics and insights for your institution.</p>
        </div>
      </div>

      <!-- Stats Grid -->
      <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-8" id="statsGrid">
        <!-- Loading State -->
        <div class="col-span-4 text-center text-gray-500 py-10">Loading statistics...</div>
      </div>

      <!-- Content Grid -->
      <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
        <!-- Quick Actions -->
        <div class="bg-white p-6 rounded-2xl shadow-soft border border-gray-100">
          <h3 class="text-lg font-bold text-gray-900 mb-4">Quick Links</h3>
          <div class="grid grid-cols-2 gap-4">
            <a href="/admin/students.html" class="p-4 rounded-xl border border-gray-100 hover:border-primary-200 hover:bg-primary-50 transition-colors flex items-center space-x-3">
              <div class="w-10 h-10 bg-primary-100 rounded-lg flex items-center justify-center text-primary-600">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"></path></svg>
              </div>
              <span class="font-medium text-gray-700">Manage Students</span>
            </a>
            <a href="/admin/assignments.html" class="p-4 rounded-xl border border-gray-100 hover:border-primary-200 hover:bg-primary-50 transition-colors flex items-center space-x-3">
              <div class="w-10 h-10 bg-green-100 rounded-lg flex items-center justify-center text-green-600">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101m-.758-4.899a4 4 0 005.656 0l4-4a4 4 0 00-5.656-5.656l-1.1 1.1"></path></svg>
              </div>
              <span class="font-medium text-gray-700">Assignments</span>
            </a>
          </div>
        </div>

        <!-- Recent Activity Placeholder -->
        <div class="bg-white p-6 rounded-2xl shadow-soft border border-gray-100 flex flex-col items-center justify-center text-gray-400">
          <svg class="w-12 h-12 mb-3 text-gray-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"></path></svg>
          <p>Charts & Graphs will load here</p>
        </div>
      </div>
    </div>
  </main>

  <script src="/admin/layout.js"></script>
  <script src="/js/admin.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      // Load Dashboard Stats
      const stats = await apiFetch('/api/admin/dashboard');
      if (stats && stats.data && stats.data.statistics) {
        const data = stats.data.statistics;
        const grid = document.getElementById('statsGrid');
        
        const statCards = [
          { label: 'Total Students', value: data.totalStudents, icon: 'M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z', color: 'blue' },
          { label: 'Total Parents', value: data.totalParents, icon: 'M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857', color: 'indigo' },
          { label: 'Total Drivers', value: data.totalDrivers, icon: 'M10 6H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V8a2 2 0 00-2-2h-5', color: 'orange' },
          { label: 'Total Buses', value: data.totalBuses, icon: 'M8 7h12m0 0l-4-4m4 4l-4 4m0 6H4m0 0l4 4m-4-4l4-4', color: 'teal' },
          { label: 'Total Routes', value: data.totalRoutes, icon: 'M9 20l-5.447-2.724A1 1 0 013 16.382V5.618a1 1 0 011.447-.894L9 7m0 13l6-3m-6 3V7m6 10l4.553 2.276A1 1 0 0021 18.382V7.618a1 1 0 00-.553-.894', color: 'purple' },
          { label: 'Active Trips', value: data.activeTrips, icon: 'M13 10V3L4 14h7v7l9-11h-7z', color: 'green' },
          { label: 'Completed Trips', value: data.completedTrips, icon: 'M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z', color: 'green' },
          { label: 'Offline Drivers', value: data.offlineDrivers, icon: 'M18.364 5.636l-3.536 3.536m0 5.656l3.536 3.536M9.172 9.172L5.636 5.636m3.536 9.192l-3.536 3.536M21 12a9 9 0 11-18 0 9 9 0 0118 0z', color: 'red' },
        ];

        grid.innerHTML = statCards.map(s => `
          <div class="bg-white p-6 rounded-2xl shadow-soft border border-gray-100 flex items-center justify-between">
            <div>
              <p class="text-sm font-medium text-gray-500 mb-1">${s.label}</p>
              <h4 class="text-3xl font-bold text-gray-900">${s.value}</h4>
            </div>
            <div class="w-12 h-12 bg-${s.color}-50 rounded-xl flex items-center justify-center text-${s.color}-600">
              <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="${s.icon}"></path></svg>
            </div>
          </div>
        `).join('');
      } else {
        document.getElementById('statsGrid').innerHTML = '<div class="col-span-4 text-center text-red-500">Failed to load statistics</div>';
      }
    });
  </script>
</body>
</html>
