<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Notifications - RouteSense</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="/js/tailwind.config.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="bg-gray-50 flex">
  <!-- Layout will be injected here -->
  <main id="main-content" class="md:ml-64 flex-1 min-h-screen flex flex-col w-full md:w-auto overflow-x-hidden">
    
    <div class="p-4 sm:p-6 md:p-8 flex-1 w-full max-w-full">
      <div class="flex flex-col sm:flex-row sm:justify-between sm:items-center mb-6 space-y-4 sm:space-y-0">
        <div>
          <h1 class="text-2xl font-bold text-gray-900">Notifications</h1>
          <p class="text-sm text-gray-500 mt-1">Broadcast targeted push notifications.</p>
        </div>
        <div class="flex space-x-3">
          <button id="addNotificationBtn" class="px-4 py-2 bg-primary-600 text-white rounded-lg font-medium hover:bg-primary-700 transition-colors shadow-sm">Send Broadcast</button>
        </div>
      </div>
      
      <div class="bg-white rounded-2xl shadow-soft overflow-hidden">
        <div class="overflow-x-auto w-full">
          <table class="w-full text-left border-collapse">
          <thead>
            <tr class="bg-gray-50 border-b border-gray-100 text-sm text-gray-500 uppercase tracking-wider">
              <th class="p-4 font-medium">Title</th>
              <th class="p-4 font-medium">Message</th>
              <th class="p-4 font-medium">Type</th>
            </tr>
          </thead>
          <tbody id="dataTableBody" class="divide-y divide-gray-100">
            <tr><td colspan="3" class="p-8 text-center text-gray-500">Loading...</td></tr>
          </tbody>
        </table>
        </div>
      </div>
    </div>

    <!-- Modal Form -->
    <div id="crudModal" class="hidden fixed inset-0 z-50 overflow-y-auto bg-gray-900 bg-opacity-50 flex items-center justify-center">
      <div class="bg-white rounded-xl shadow-lg w-full max-w-md mx-4 sm:mx-auto p-6">
        <div class="flex justify-between items-center mb-4">
          <h2 id="modalTitle" class="text-xl font-bold text-gray-900">Send Notification</h2>
          <button id="closeModalBtn" class="text-gray-400 hover:text-gray-600">&times;</button>
        </div>
        <form id="crudForm" class="space-y-4">
          <div>
            <label class="block text-sm font-medium text-gray-700">Title</label>
            <input type="text" name="title" required class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm py-2 px-3 focus:outline-none focus:ring-primary-500 focus:border-primary-500">
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700">Body</label>
            <textarea name="body" required class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm py-2 px-3 focus:outline-none focus:ring-primary-500 focus:border-primary-500"></textarea>
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700">Type</label>
            <select name="type" required class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm py-2 px-3 focus:outline-none focus:ring-primary-500 focus:border-primary-500">
              <option value="info">Info</option>
              <option value="alert">Alert</option>
              <option value="emergency">Emergency</option>
            </select>
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700">Role</label>
            <select name="role" required class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm py-2 px-3 focus:outline-none focus:ring-primary-500 focus:border-primary-500">
              <option value="All">All</option>
              <option value="Parent">Parents</option>
              <option value="Driver">Drivers</option>
            </select>
          </div>
          <div class="flex justify-end space-x-3 mt-6">
            <button type="button" id="cancelModalBtn" class="px-4 py-2 border border-gray-300 rounded-md text-gray-700 hover:bg-gray-50">Cancel</button>
            <button type="submit" class="px-4 py-2 bg-primary-600 text-white rounded-md hover:bg-primary-700">Broadcast</button>
          </div>
        </form>
      </div>
    </div>

  </main>
  <script src="/admin/layout.js"></script>
  <script src="/js/admin.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      async function loadData() {
        // We load the current admin's received notifications to show in table
        const res = await apiFetch(`/api/notifications`);
        if (!res || !res.success) return;
        
        const tbody = document.getElementById('dataTableBody');
        tbody.innerHTML = '';
        
        if (res.data.length === 0) {
          tbody.innerHTML = '<tr><td colspan="3" class="p-8 text-center text-gray-500">No notifications found.</td></tr>';
        } else {
          res.data.forEach(item => {
            tbody.innerHTML += `
              <tr class="hover:bg-gray-50/50 transition-colors">
                <td class="p-4 text-sm font-medium text-gray-900">${item.title}</td>
                <td class="p-4 text-sm text-gray-600">${item.body}</td>
                <td class="p-4 text-sm text-gray-600"><span class="px-2 py-1 bg-gray-100 rounded text-xs">${item.type}</span></td>
              </tr>
            `;
          });
        }
      }

      loadData();
      
      // Add Button
      document.getElementById('addNotificationBtn').addEventListener('click', () => {
        document.getElementById('crudModal').classList.remove('hidden');
        document.getElementById('crudForm').reset();
        document.getElementById('modalTitle').innerText = 'Send Broadcast';
      });

      // Form Submit
      document.getElementById('crudForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const formData = new FormData(e.target);
        const data = Object.fromEntries(formData.entries());

        const res = await apiFetch('/api/notifications/broadcast', {
          method: 'POST',
          body: JSON.stringify(data)
        });

        if (res && res.success) {
          document.getElementById('cancelModalBtn').click();
          loadData();
        } else {
          alert(res ? res.message : 'Error sending broadcast');
        }
      });
    });
  </script>
</body>
</html>
