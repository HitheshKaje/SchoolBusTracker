<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Profile - RouteSense</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="/js/tailwind.config.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="bg-gray-50 flex">
  <!-- Sidebar injected by layout.js -->

  <main id="main-content" class="ml-64 flex-1 min-h-screen flex flex-col">
    <!-- Topbar injected by layout.js -->

    <div class="p-8 flex-1">
      <div class="flex justify-between items-center mb-8">
        <div>
          <h1 class="text-2xl font-bold text-gray-900">Admin Profile</h1>
          <p class="text-sm text-gray-500 mt-1">Manage your account settings and preferences.</p>
        </div>
      </div>

      <div class="bg-white p-8 rounded-2xl shadow-soft border border-gray-100 max-w-3xl">
        <h3 class="text-lg font-bold text-gray-900 mb-6">Danger Zone</h3>
        <div class="border border-red-200 rounded-xl p-6 bg-red-50 flex items-start justify-between">
          <div>
            <h4 class="text-md font-bold text-red-700">Delete Account</h4>
            <p class="text-sm text-red-600 mt-1">Permanently delete your admin account, institution, and all associated data. This action cannot be undone.</p>
          </div>
          <button id="deleteAccountBtn" class="bg-red-600 hover:bg-red-700 text-white px-5 py-2.5 rounded-lg shadow-sm transition-colors font-medium flex items-center shrink-0">
            <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
            Delete Account
          </button>
        </div>
      </div>
    </div>
  </main>

  <script src="/admin/layout.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const deleteBtn = document.getElementById('deleteAccountBtn');
      if (deleteBtn) {
        deleteBtn.addEventListener('click', async () => {
          const confirmDelete = confirm("Are you sure you want to permanently delete your account? This action cannot be undone.");
          
          if (!confirmDelete) return;

          const token = localStorage.getItem('token');
          if (!token) return;

          try {
            const response = await fetch('/api/auth/me', {
              method: 'DELETE',
              headers: {
                'Authorization': `Bearer ${token}`,
                'Content-Type': 'application/json'
              }
            });
            
            const data = await response.json();
            
            if (response.ok && data.success) {
              alert('Account deleted successfully.');
              localStorage.removeItem('token');
              localStorage.removeItem('user');
              window.location.href = '/login.html';
            } else {
              alert(data.message || 'Failed to delete account.');
            }
          } catch (error) {
            console.error('Delete error:', error);
            alert('An error occurred while deleting your account. Please try again.');
          }
        });
      }
    });
  </script>
</body>
</html>
