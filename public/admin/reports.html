<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reports - RouteSense</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="/js/tailwind.config.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="bg-gray-50 flex">
  <main id="main-content" class="md:ml-64 flex-1 min-h-screen flex flex-col w-full md:w-auto overflow-x-hidden">
    <div class="p-4 sm:p-6 md:p-8 flex-1 w-full max-w-full">
      <div class="flex flex-col sm:flex-row sm:justify-between sm:items-center mb-6 space-y-4 sm:space-y-0">
        <div>
          <h1 class="text-2xl font-bold text-gray-900">Reports Generation</h1>
          <p class="text-sm text-gray-500 mt-1">Export institutional data directly into PDF or Excel formats.</p>
        </div>
      </div>
      
      <div class="grid grid-cols-1 md:grid-cols-2 gap-6 max-w-4xl">
        <!-- Student Reports -->
        <div class="bg-white p-6 rounded-2xl shadow-soft border border-gray-100 flex flex-col items-start space-y-4">
          <h3 class="text-lg font-bold text-gray-900">Student Roster</h3>
          <p class="text-sm text-gray-500">Includes admission numbers, assigned routes, and basic info.</p>
          <div class="flex space-x-3 mt-auto w-full pt-4 border-t border-gray-50">
            <button id="btnStudExcel" class="flex-1 px-4 py-2 bg-green-50 text-green-700 border border-green-200 rounded-lg font-medium hover:bg-green-100 transition-colors">Excel (.xlsx)</button>
            <button id="btnStudPdf" class="flex-1 px-4 py-2 bg-red-50 text-red-700 border border-red-200 rounded-lg font-medium hover:bg-red-100 transition-colors">PDF</button>
          </div>
        </div>
      </div>
    </div>
  </main>
  <script src="/admin/layout.js"></script>
  <script src="/js/admin.js"></script>
  <script>
    document.getElementById('btnStudExcel').addEventListener('click', () => {
      apiFetch('/api/reports/students/excel');
    });
    document.getElementById('btnStudPdf').addEventListener('click', () => {
      apiFetch('/api/reports/students/pdf');
    });
  </script>
</body>
</html>
