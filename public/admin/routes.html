<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manage Routes - RouteSense</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="/js/tailwind.config.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="bg-gray-50 flex">
  <main id="main-content" class="ml-64 flex-1 min-h-screen flex flex-col">
    <div class="p-8 flex-1">
      <div class="flex justify-between items-center mb-6">
        <div>
          <h1 class="text-2xl font-bold text-gray-900">Route & Stop Management</h1>
          <p class="text-sm text-gray-500 mt-1">Manage bus routes and stops.</p>
        </div>
        <div class="flex space-x-3">
          <button id="addRouteBtn" class="px-4 py-2 bg-primary-600 text-white rounded-lg font-medium hover:bg-primary-700 transition-colors shadow-sm">Add Route</button>
        </div>
      </div>
      <div class="bg-white p-4 rounded-t-2xl border-b border-gray-100 shadow-soft flex items-center justify-between">
        <div class="relative w-64">
          <input type="text" id="searchInput" placeholder="Search routes..." class="w-full pl-10 pr-4 py-2 rounded-lg border border-gray-200 focus:outline-none focus:ring-2 focus:ring-primary-500 focus:border-primary-500 transition-shadow">
          <svg class="w-5 h-5 text-gray-400 absolute left-3 top-2.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
        </div>
      </div>
      <div class="bg-white rounded-b-2xl shadow-soft overflow-hidden border border-t-0 border-gray-100">
        <table class="min-w-full divide-y divide-gray-200">
          <thead class="bg-gray-50">
            <tr>
              <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Route Number</th>
              <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Name</th>
              <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Distance</th>
              <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Total Stops</th>
              <th scope="col" class="px-6 py-3 text-right text-xs font-medium text-gray-500 uppercase tracking-wider">Actions</th>
            </tr>
          </thead>
          <tbody id="tableBody" class="bg-white divide-y divide-gray-200"></tbody>
        </table>
        <div class="bg-white px-4 py-3 border-t border-gray-200 flex items-center justify-between sm:px-6">
          <div class="text-sm text-gray-700" id="paginationInfo">Loading...</div>
          <div class="flex space-x-2">
            <button id="prevPageBtn" class="px-3 py-1 border border-gray-300 rounded text-gray-600 hover:bg-gray-50" disabled>Previous</button>
            <button id="nextPageBtn" class="px-3 py-1 border border-gray-300 rounded text-gray-600 hover:bg-gray-50" disabled>Next</button>
          </div>
        </div>
      </div>
    </div>

    <!-- Modal Form -->
    <div id="crudModal" class="hidden fixed inset-0 z-50 overflow-y-auto bg-gray-900 bg-opacity-50 flex items-center justify-center">
      <div class="bg-white rounded-xl shadow-lg w-full max-w-md p-6">
        <div class="flex justify-between items-center mb-4">
          <h2 id="modalTitle" class="text-xl font-bold text-gray-900">Add Route</h2>
          <button id="closeModalBtn" class="text-gray-400 hover:text-gray-600">&times;</button>
        </div>
        <form id="crudForm" class="space-y-4">
          <div>
            <label class="block text-sm font-medium text-gray-700">Route Number</label>
            <input type="text" name="routeNumber" required class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm py-2 px-3 focus:outline-none focus:ring-primary-500 focus:border-primary-500">
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700">Name / Description</label>
            <input type="text" name="name" required class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm py-2 px-3 focus:outline-none focus:ring-primary-500 focus:border-primary-500">
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700">Distance (km)</label>
            <input type="number" step="0.1" name="distance" class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm py-2 px-3 focus:outline-none focus:ring-primary-500 focus:border-primary-500">
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700">Starting Point (From)</label>
            <input type="text" name="startPoint" required class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm py-2 px-3 focus:outline-none focus:ring-primary-500 focus:border-primary-500">
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700">Destination (To)</label>
            <input type="text" name="endPoint" required class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm py-2 px-3 focus:outline-none focus:ring-primary-500 focus:border-primary-500">
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700">Estimated Travel Time</label>
            <input type="text" name="estimatedTime" placeholder="e.g. 45 mins" class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm py-2 px-3 focus:outline-none focus:ring-primary-500 focus:border-primary-500">
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Ordered Stops</label>
            <div class="flex space-x-2 mb-2">
              <select id="stopSelector" class="block w-full border border-gray-300 rounded-md shadow-sm py-2 px-3 focus:outline-none focus:ring-primary-500 focus:border-primary-500">
                <option value="">Select a Stop to Add</option>
              </select>
              <button type="button" id="addStopBtnInline" class="px-4 py-2 bg-gray-100 border border-gray-300 rounded-md text-gray-700 hover:bg-gray-200">Add</button>
            </div>
            <ul id="selectedStopsList" class="space-y-2 mt-2 max-h-40 overflow-y-auto"></ul>
          </div>
          <div class="flex justify-end space-x-3 mt-6">
            <button type="button" id="cancelModalBtn" class="px-4 py-2 border border-gray-300 rounded-md text-gray-700 hover:bg-gray-50">Cancel</button>
            <button type="submit" class="px-4 py-2 bg-primary-600 text-white rounded-md hover:bg-primary-700">Save</button>
          </div>
        </form>
      </div>
    </div>

  </main>
  <script src="/admin/layout.js"></script>
  <script src="/js/admin.js"></script>
  <script>
    let currentPage = 1;
    let currentSearch = '';

    const columns = [
      { key: 'routeNumber', format: (val) => `<div class="font-bold text-gray-900">${val || '-'}</div>` },
      { key: 'name' },
      { key: 'distance', format: (val) => val || 'N/A' },
      { key: 'stops', format: (val) => val && val.length ? val.length : '0' }
    ];

    const loadData = async () => {
      const url = `/api/routes?page=${currentPage}&limit=10${currentSearch ? '&search=' + currentSearch : ''}`;
      const res = await apiFetch(url);
      if (res && res.data) {
        renderTable(res.data, columns, 'tableBody');
        const { total, page, limit } = res.pagination;
        document.getElementById('paginationInfo').innerText = `Showing ${(page-1)*limit + 1} to ${Math.min(page*limit, total)} of ${total} results`;
        document.getElementById('prevPageBtn').disabled = page <= 1;
        document.getElementById('nextPageBtn').disabled = page * limit >= total;
      }
    };

    document.addEventListener('DOMContentLoaded', () => {
      loadData();
      const searchInput = document.getElementById('searchInput');
      let timeout = null;
      searchInput.addEventListener('input', (e) => {
        clearTimeout(timeout);
        timeout = setTimeout(() => { currentSearch = e.target.value; currentPage = 1; loadData(); }, 500);
      });
      document.getElementById('prevPageBtn').addEventListener('click', () => { if (currentPage > 1) { currentPage--; loadData(); } });
      document.getElementById('nextPageBtn').addEventListener('click', () => { currentPage++; loadData(); });

      // Add Button
      document.getElementById('addRouteBtn').addEventListener('click', () => {
        const form = document.getElementById('crudForm');
        form.reset();
        delete form.dataset.editId;
        document.getElementById('selectedStopsList').innerHTML = '';
        document.getElementById('crudModal').classList.remove('hidden');
        document.getElementById('modalTitle').innerText = 'Add Route';
      });

      // Stop selection logic
      let allStops = [];
      const loadStopsForDropdown = async () => {
        const res = await apiFetch('/api/stops?limit=1000');
        if (res && res.data) {
          allStops = res.data;
          const select = document.getElementById('stopSelector');
          select.innerHTML = '<option value="">Select a Stop to Add</option>' + res.data.map(s => `<option value="${s._id}">${s.name}</option>`).join('');
        }
      };
      loadStopsForDropdown();

      window.removeStopInline = (btn) => {
        btn.parentElement.remove();
      };

      document.getElementById('addStopBtnInline').addEventListener('click', () => {
        const select = document.getElementById('stopSelector');
        if (!select.value) return;
        const stopName = select.options[select.selectedIndex].text;
        const stopId = select.value;
        const li = document.createElement('li');
        li.className = 'flex justify-between items-center bg-gray-50 border border-gray-200 p-2 rounded-md';
        li.innerHTML = `
          <span class="text-sm text-gray-700">☰ ${stopName}</span>
          <input type="hidden" name="stops[]" value="${stopId}">
          <button type="button" onclick="removeStopInline(this)" class="text-red-500 text-sm hover:text-red-700">Remove</button>
        `;
        document.getElementById('selectedStopsList').appendChild(li);
        select.value = '';
      });

      // Form Submit (Create/Update)
      document.getElementById('crudForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const formData = new FormData(e.target);
        const data = Object.fromEntries(formData.entries());
        data.stops = formData.getAll('stops[]');
        
        const editId = e.target.dataset.editId;
        const method = editId ? 'PUT' : 'POST';
        const url = editId ? `/api/routes/${editId}` : '/api/routes';

        const res = await apiFetch(url, {
          method,
          body: JSON.stringify(data)
        });

        if (res && res.success) {
          document.getElementById('cancelModalBtn').click();
          loadData();
        } else {
          alert(res ? res.message : 'Error saving route');
        }
      });
    });

    // Global edit hook
    window.openEditModal = async (id) => {
      const res = await apiFetch(`/api/routes/${id}`);
      if (res && res.data) {
        const form = document.getElementById('crudForm');
        form.dataset.editId = id;
        document.getElementById('modalTitle').innerText = 'Edit Route';
        
        Object.keys(res.data).forEach(key => {
          if (key !== 'stops') {
            const input = form.elements[key];
            if (input) input.value = res.data[key];
          }
        });

        const list = document.getElementById('selectedStopsList');
        list.innerHTML = '';
        if (res.data.stops && Array.isArray(res.data.stops)) {
          // Sort stops by order just in case
          const sortedStops = res.data.stops.sort((a,b) => (a.order || 0) - (b.order || 0));
          sortedStops.forEach(stop => {
            const li = document.createElement('li');
            li.className = 'flex justify-between items-center bg-gray-50 border border-gray-200 p-2 rounded-md';
            li.innerHTML = `
              <span class="text-sm text-gray-700">☰ ${stop.name}</span>
              <input type="hidden" name="stops[]" value="${stop._id}">
              <button type="button" onclick="removeStopInline(this)" class="text-red-500 text-sm hover:text-red-700">Remove</button>
            `;
            list.appendChild(li);
          });
        }
        document.getElementById('crudModal').classList.remove('hidden');
      }
    };
  </script>
</body>
</html>
