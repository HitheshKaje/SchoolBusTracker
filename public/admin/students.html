<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manage Students - RouteSense</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="/js/tailwind.config.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="bg-gray-50 flex">

  <!-- Sidebar injected by layout.js -->

  <main id="main-content" class="ml-64 flex-1 min-h-screen flex flex-col">
    <!-- Topbar injected by layout.js -->
    
    <div class="p-8 flex-1">
      <div class="flex justify-between items-center mb-6">
        <div>
          <h1 class="text-2xl font-bold text-gray-900">Student Management</h1>
          <p class="text-sm text-gray-500 mt-1">Manage and track student information.</p>
        </div>
        <div class="flex space-x-3">
          <button id="exportPdfBtn" class="px-4 py-2 bg-white border border-gray-200 rounded-lg text-gray-700 font-medium hover:bg-gray-50 transition-colors">Export PDF</button>
          <button id="exportExcelBtn" class="px-4 py-2 bg-white border border-gray-200 rounded-lg text-gray-700 font-medium hover:bg-gray-50 transition-colors">Export Excel</button>
          <button id="addStudentBtn" class="px-4 py-2 bg-primary-600 text-white rounded-lg font-medium hover:bg-primary-700 transition-colors shadow-sm">Add Student</button>
        </div>
      </div>

      <!-- Search & Filters -->
      <div class="bg-white p-4 rounded-t-2xl border-b border-gray-100 shadow-soft flex items-center justify-between">
        <div class="relative w-64">
          <input type="text" id="searchInput" placeholder="Search students..." class="w-full pl-10 pr-4 py-2 rounded-lg border border-gray-200 focus:outline-none focus:ring-2 focus:ring-primary-500 focus:border-primary-500 transition-shadow">
          <svg class="w-5 h-5 text-gray-400 absolute left-3 top-2.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
        </div>
      </div>

      <!-- Table -->
      <div class="bg-white rounded-b-2xl shadow-soft overflow-hidden border border-t-0 border-gray-100">
        <table class="min-w-full divide-y divide-gray-200">
          <thead class="bg-gray-50">
            <tr>
              <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Adm. No</th>
              <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Name</th>
              <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Class</th>
              <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Bus</th>
              <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Route</th>
              <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Status</th>
              <th scope="col" class="px-6 py-3 text-right text-xs font-medium text-gray-500 uppercase tracking-wider">Actions</th>
            </tr>
          </thead>
          <tbody id="studentsTableBody" class="bg-white divide-y divide-gray-200">
            <!-- Data injected via JS -->
          </tbody>
        </table>
        
        <!-- Pagination -->
        <div class="bg-white px-4 py-3 border-t border-gray-200 flex items-center justify-between sm:px-6">
          <div class="text-sm text-gray-700" id="paginationInfo">Loading...</div>
          <div class="flex space-x-2">
            <button id="prevPageBtn" class="px-3 py-1 border border-gray-300 rounded text-gray-600 hover:bg-gray-50" disabled>Previous</button>
            <button id="nextPageBtn" class="px-3 py-1 border border-gray-300 rounded text-gray-600 hover:bg-gray-50" disabled>Next</button>
          </div>
        </div>
      </div>
    </div>

    <!-- Modal Form -->
    <div id="crudModal" class="hidden fixed inset-0 z-50 overflow-y-auto bg-gray-900 bg-opacity-50 flex items-center justify-center">
      <div class="bg-white rounded-xl shadow-lg w-full max-w-md p-6">
        <div class="flex justify-between items-center mb-4">
          <h2 id="modalTitle" class="text-xl font-bold text-gray-900">Add Student</h2>
          <button id="closeModalBtn" class="text-gray-400 hover:text-gray-600">&times;</button>
        </div>
        <form id="crudForm" class="space-y-4">
          <div>
            <label class="block text-sm font-medium text-gray-700">Name</label>
            <input type="text" name="name" required class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm py-2 px-3 focus:outline-none focus:ring-primary-500 focus:border-primary-500">
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700">Student ID</label>
            <input type="text" name="studentId" required class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm py-2 px-3 focus:outline-none focus:ring-primary-500 focus:border-primary-500">
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700">Admission Number</label>
            <input type="text" name="admissionNumber" required class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm py-2 px-3 focus:outline-none focus:ring-primary-500 focus:border-primary-500">
          </div>
          <div class="flex justify-end space-x-3 mt-6">
            <button type="button" id="cancelModalBtn" class="px-4 py-2 border border-gray-300 rounded-md text-gray-700 hover:bg-gray-50">Cancel</button>
            <button type="submit" class="px-4 py-2 bg-primary-600 text-white rounded-md hover:bg-primary-700">Save</button>
          </div>
        </form>
      </div>
    </div>

  </main>

  <script src="/admin/layout.js"></script>
  <script src="/js/admin.js"></script>
  <script>
    let currentPage = 1;
    let currentSearch = '';

    const columns = [
      { key: 'admissionNumber' },
      { key: 'name', format: (val, row) => `<div class="font-medium text-gray-900">${val}</div><div class="text-xs text-gray-500">ID: ${row.studentId}</div>` },
      { key: 'grade', format: (val, row) => `${val || '-'} ${row.section ? '('+row.section+')' : ''}` },
      { key: 'assignedBus.registrationNumber' },
      { key: 'assignedRoute.name' },
      { key: 'status', format: (val) => `<span class="px-2 inline-flex text-xs leading-5 font-semibold rounded-full ${val === 'active' ? 'bg-green-100 text-green-800' : 'bg-red-100 text-red-800'}">${val}</span>` }
    ];

    const loadStudents = async () => {
      const url = `/api/students?page=${currentPage}&limit=10${currentSearch ? '&search=' + currentSearch : ''}`;
      const res = await apiFetch(url);
      
      if (res && res.data) {
        renderTable(res.data, columns, 'studentsTableBody');
        
        const { total, page, limit } = res.pagination;
        document.getElementById('paginationInfo').innerText = `Showing ${(page-1)*limit + 1} to ${Math.min(page*limit, total)} of ${total} results`;
        
        document.getElementById('prevPageBtn').disabled = page <= 1;
        document.getElementById('nextPageBtn').disabled = page * limit >= total;
      }
    };

    document.addEventListener('DOMContentLoaded', () => {
      loadStudents();

      // Search
      const searchInput = document.getElementById('searchInput');
      let timeout = null;
      searchInput.addEventListener('input', (e) => {
        clearTimeout(timeout);
        timeout = setTimeout(() => {
          currentSearch = e.target.value;
          currentPage = 1;
          loadStudents();
        }, 500);
      });

      // Pagination
      document.getElementById('prevPageBtn').addEventListener('click', () => {
        if (currentPage > 1) { currentPage--; loadStudents(); }
      });
      document.getElementById('nextPageBtn').addEventListener('click', () => {
        currentPage++; loadStudents();
      });

      // Exports
      document.getElementById('exportPdfBtn').addEventListener('click', () => {
        apiFetch('/api/reports/students/pdf');
      });
      document.getElementById('exportExcelBtn').addEventListener('click', () => {
        apiFetch('/api/reports/students/excel');
      });

      // Add Button
      document.getElementById('addStudentBtn').addEventListener('click', () => {
        document.getElementById('crudModal').classList.remove('hidden');
        document.getElementById('modalTitle').innerText = 'Add Student';
      });

      // Form Submit (Create/Update)
      document.getElementById('crudForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const formData = new FormData(e.target);
        const data = Object.fromEntries(formData.entries());
        const editId = e.target.dataset.editId;
        const method = editId ? 'PUT' : 'POST';
        const url = editId ? `/api/students/${editId}` : '/api/students';

        const res = await apiFetch(url, {
          method,
          body: JSON.stringify(data)
        });

        if (res && res.success) {
          document.getElementById('cancelModalBtn').click();
          loadStudents();
        } else {
          alert(res ? res.message : 'Error saving student');
        }
      });
    });

    // Global edit hook called from admin.js
    window.openEditModal = async (id) => {
      const res = await apiFetch(`/api/students/${id}`);
      if (res && res.data) {
        const form = document.getElementById('crudForm');
        form.dataset.editId = id;
        document.getElementById('modalTitle').innerText = 'Edit Student';
        
        Object.keys(res.data).forEach(key => {
          const input = form.elements[key];
          if (input) input.value = res.data[key];
        });
        document.getElementById('crudModal').classList.remove('hidden');
      }
    };
  </script>
</body>
</html>
