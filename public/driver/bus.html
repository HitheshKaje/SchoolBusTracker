<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Assigned Bus - RouteSense</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: {
              50: '#eff6ff', 100: '#dbeafe', 200: '#bfdbfe', 300: '#93c5fd', 400: '#60a5fa',
              500: '#3b82f6', 600: '#2563eb', 700: '#1d4ed8', 800: '#1e40af', 900: '#1e3a8a',
            }
          }
        }
      }
    }
  </script>
</head>
<body class="bg-gray-50 text-gray-800 font-sans antialiased overflow-hidden flex">
  <main id="main-content" class="flex-1 ml-64 h-screen overflow-y-auto">
    <div class="p-8 max-w-5xl mx-auto space-y-8">
      
      <div class="bg-white rounded-2xl p-8 shadow-sm border border-gray-100">
        <h1 class="text-2xl font-bold text-gray-900 mb-6 flex items-center">
          <svg class="w-6 h-6 text-primary-600 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7h12m0 0l-4-4m4 4l-4 4m0 6H4m0 0l4 4m-4-4l4-4"></path></svg>
          My Assigned Bus
        </h1>
        
        <div id="busContainer" class="hidden grid grid-cols-1 md:grid-cols-2 gap-6">
          <div class="space-y-4">
             <div>
               <p class="text-sm text-gray-500 font-medium">Bus Number</p>
               <p class="text-lg font-semibold text-gray-900" id="busNumber">-</p>
             </div>
             <div>
               <p class="text-sm text-gray-500 font-medium">Registration Number</p>
               <p class="text-lg font-semibold text-gray-900" id="busReg">-</p>
             </div>
             <div>
               <p class="text-sm text-gray-500 font-medium">Capacity</p>
               <p class="text-lg font-semibold text-gray-900" id="busCapacity">-</p>
             </div>
          </div>
          <div class="space-y-4">
             <div>
               <p class="text-sm text-gray-500 font-medium">Bus Type</p>
               <p class="text-lg font-semibold text-gray-900" id="busType">-</p>
             </div>
             <div>
               <p class="text-sm text-gray-500 font-medium">Status</p>
               <p class="mt-1" id="busStatus">-</p>
             </div>
          </div>
        </div>

        <div id="noBusMessage" class="hidden text-center py-12">
           <svg class="w-16 h-16 text-gray-300 mx-auto mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>
           <h3 class="text-lg font-medium text-gray-900">No Bus Assigned</h3>
           <p class="text-gray-500 mt-2">You currently do not have a bus assigned to you. Please contact your administrator.</p>
        </div>

      </div>
    </div>
  </main>

  <script src="/driver/layout.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      const token = localStorage.getItem('token');
      try {
        const response = await fetch('/api/driver-app/bus', {
          headers: { 'Authorization': `Bearer ${token}` }
        });
        const data = await response.json();
        
        if (data.success && data.data) {
          const bus = data.data;
          document.getElementById('busContainer').classList.remove('hidden');
          
          document.getElementById('busNumber').textContent = bus.busNumber;
          document.getElementById('busReg').textContent = bus.registrationNumber;
          document.getElementById('busCapacity').textContent = `${bus.capacity} seats`;
          document.getElementById('busType').textContent = bus.type ? bus.type.charAt(0).toUpperCase() + bus.type.slice(1) : 'Standard';
          
          let statusColor = bus.status === 'active' ? 'bg-green-100 text-green-800' : 'bg-red-100 text-red-800';
          document.getElementById('busStatus').innerHTML = `<span class="px-3 py-1 inline-flex text-xs leading-5 font-semibold rounded-full ${statusColor}">${bus.status.toUpperCase()}</span>`;
        } else {
          document.getElementById('noBusMessage').classList.remove('hidden');
        }
      } catch (error) {
        console.error('Error fetching assigned bus:', error);
      }
    });
  </script>
</body>
</html>
