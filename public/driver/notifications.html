<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Notifications - RouteSense</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: {
              50: '#eff6ff', 100: '#dbeafe', 200: '#bfdbfe', 300: '#93c5fd', 400: '#60a5fa',
              500: '#3b82f6', 600: '#2563eb', 700: '#1d4ed8', 800: '#1e40af', 900: '#1e3a8a',
            }
          }
        }
      }
    }
  </script>
</head>
<body class="bg-gray-50 text-gray-800 font-sans antialiased overflow-hidden flex">
  <main id="main-content" class="flex-1 ml-64 h-screen overflow-y-auto">
    <div class="p-8 max-w-4xl mx-auto space-y-6">
      
      <div class="flex items-center justify-between mb-8">
        <h1 class="text-2xl font-bold text-gray-900 flex items-center">
          <svg class="w-6 h-6 text-primary-600 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"></path></svg>
          Announcements & Notifications
        </h1>
        <span class="bg-primary-100 text-primary-800 text-xs font-semibold px-3 py-1 rounded-full" id="notificationCount">0 Total</span>
      </div>

      <div id="notificationsContainer" class="space-y-4">
         <!-- Notifications loaded here -->
         <div class="text-center py-12 text-gray-500">Loading notifications...</div>
      </div>

    </div>
  </main>

  <script src="/driver/layout.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      const token = localStorage.getItem('token');
      try {
        const response = await fetch('/api/driver-app/notifications', {
          headers: { 'Authorization': `Bearer ${token}` }
        });
        const data = await response.json();
        
        const container = document.getElementById('notificationsContainer');
        
        if (data.success) {
          const notifications = data.data;
          document.getElementById('notificationCount').textContent = `${notifications.length} Total`;
          
          if (notifications.length === 0) {
            container.innerHTML = `
              <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-12 text-center">
                <svg class="w-16 h-16 text-gray-300 mx-auto mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 13V6a2 2 0 00-2-2H6a2 2 0 00-2 2v7m16 0v5a2 2 0 01-2 2H6a2 2 0 01-2-2v-5m16 0h-2.586a1 1 0 00-.707.293l-2.414 2.414a1 1 0 01-.707.293h-3.172a1 1 0 01-.707-.293l-2.414-2.414A1 1 0 006.586 13H4"></path></svg>
                <p class="text-gray-500 font-medium">You have no new notifications.</p>
              </div>
            `;
          } else {
            container.innerHTML = '';
            notifications.forEach(item => {
              const isUrgent = item.priority === 'High' || item.type === 'Alert';
              const iconBg = isUrgent ? 'bg-red-100 text-red-600' : 'bg-blue-100 text-blue-600';
              const iconSvg = isUrgent 
                ? '<svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>'
                : '<svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>';

              const dateStr = new Date(item.createdAt).toLocaleString(undefined, {
                year: 'numeric', month: 'short', day: 'numeric',
                hour: '2-digit', minute: '2-digit'
              });

              const card = document.createElement('div');
              card.className = `bg-white rounded-2xl shadow-sm border ${isUrgent ? 'border-red-200' : 'border-gray-100'} p-6 flex items-start space-x-4 hover:shadow-md transition-shadow relative overflow-hidden`;
              card.innerHTML = `
                <div class="flex-shrink-0 w-12 h-12 rounded-full ${iconBg} flex items-center justify-center">
                  ${iconSvg}
                </div>
                <div class="flex-1">
                  <div class="flex items-center justify-between mb-1">
                    <h3 class="text-lg font-bold text-gray-900">${item.title}</h3>
                    <span class="text-xs font-medium text-gray-400 whitespace-nowrap ml-4">${dateStr}</span>
                  </div>
                  <p class="text-gray-600 text-sm whitespace-pre-wrap">${item.content || item.message}</p>
                </div>
                <!-- Read indicator pseudo-badge could go here if tracking read status per user -->
              `;
              container.appendChild(card);
            });
          }
        }
      } catch (error) {
        console.error('Error fetching notifications:', error);
      }
    });
  </script>
</body>
</html>
