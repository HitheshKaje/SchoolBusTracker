<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Assigned Students - RouteSense</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: {
              50: '#eff6ff', 100: '#dbeafe', 200: '#bfdbfe', 300: '#93c5fd', 400: '#60a5fa',
              500: '#3b82f6', 600: '#2563eb', 700: '#1d4ed8', 800: '#1e40af', 900: '#1e3a8a',
            }
          }
        }
      }
    }
  </script>
</head>
<body class="bg-gray-50 text-gray-800 font-sans antialiased overflow-hidden flex">
  <main id="main-content" class="flex-1 md:ml-64 h-screen overflow-y-auto w-full md:w-auto overflow-x-hidden">
    <div class="p-4 sm:p-6 md:p-8 max-w-7xl mx-auto space-y-4 sm:space-y-8 w-full">
      
      <div class="bg-white rounded-2xl p-8 shadow-sm border border-gray-100 flex flex-col md:flex-row items-center justify-between">
        <div>
           <h1 class="text-2xl font-bold text-gray-900 mb-2 flex items-center">
             <svg class="w-6 h-6 text-primary-600 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"></path></svg>
             My Assigned Students
           </h1>
           <p class="text-gray-500 text-sm">List of students traveling on your assigned bus.</p>
        </div>
        <div class="mt-4 md:mt-0 px-4 py-2 bg-primary-50 rounded-lg border border-primary-100">
           <p class="text-xs text-primary-600 font-bold uppercase tracking-wider">Total Students</p>
           <p class="text-2xl font-black text-primary-700" id="totalStudentsCount">0</p>
        </div>
      </div>

      <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
        <div class="overflow-x-auto w-full">
          <table class="min-w-full divide-y divide-gray-200">
          <thead class="bg-gray-50">
            <tr>
              <th scope="col" class="px-6 py-4 text-left text-xs font-bold text-gray-500 uppercase tracking-wider">Student Details</th>
              <th scope="col" class="px-6 py-4 text-left text-xs font-bold text-gray-500 uppercase tracking-wider">Class/Grade</th>
              <th scope="col" class="px-6 py-4 text-left text-xs font-bold text-gray-500 uppercase tracking-wider">Pickup Stop</th>
              <th scope="col" class="px-6 py-4 text-left text-xs font-bold text-gray-500 uppercase tracking-wider">Dropoff Stop</th>
              <th scope="col" class="px-6 py-4 text-left text-xs font-bold text-gray-500 uppercase tracking-wider">Status</th>
            </tr>
          </thead>
          <tbody class="bg-white divide-y divide-gray-200" id="studentsTableBody">
            <!-- Students inserted here -->
            <tr><td colspan="5" class="px-6 py-8 text-center text-sm text-gray-500">Loading students...</td></tr>
          </tbody>
        </table>
        </div>
      </div>

    </div>
  </main>

  <script src="/driver/layout.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      const token = localStorage.getItem('token');
      try {
        const response = await fetch('/api/driver-app/students', {
          headers: { 'Authorization': `Bearer ${token}` }
        });
        const data = await response.json();
        
        const tbody = document.getElementById('studentsTableBody');
        
        if (data.success) {
          const students = data.data;
          document.getElementById('totalStudentsCount').textContent = students.length;
          
          if (students.length === 0) {
            tbody.innerHTML = `<tr><td colspan="5" class="px-6 py-8 text-center text-sm text-gray-500">No students are currently assigned to your bus.</td></tr>`;
          } else {
            tbody.innerHTML = '';
            students.forEach(student => {
              const statusBadge = `<span class="px-2 py-1 text-xs font-semibold rounded-full bg-green-100 text-green-800">Active</span>`;
                
              const tr = document.createElement('tr');
              tr.className = 'hover:bg-gray-50 transition-colors';
              tr.innerHTML = `
                <td class="px-6 py-4">
                   <div class="flex flex-col">
                     <span class="text-sm font-bold text-gray-900">${student.name}</span>
                     <span class="text-xs text-gray-500">Admn: ${student.admissionNumber}</span>
                   </div>
                </td>
                <td class="px-6 py-4 text-sm text-gray-700 font-medium">${student.grade} ${student.section ? '- ' + student.section : ''}</td>
                <td class="px-6 py-4">
                   <div class="text-sm text-gray-900 font-medium">${student.pickupStop ? student.pickupStop.name : 'Not Assigned'}</div>
                   <div class="text-xs text-gray-500">${student.pickupStop ? student.pickupStop.estimatedArrivalTime : ''}</div>
                </td>
                <td class="px-6 py-4">
                   <div class="text-sm text-gray-900 font-medium">${student.dropoffStop ? student.dropoffStop.name : 'Not Assigned'}</div>
                </td>
                <td class="px-6 py-4 whitespace-nowrap">${statusBadge}</td>
              `;
              tbody.appendChild(tr);
            });
          }
        }
      } catch (error) {
        console.error('Error fetching students:', error);
      }
    });
  </script>
</body>
</html>
