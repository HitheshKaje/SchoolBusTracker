<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password - RouteSense</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="/js/tailwind.config.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="bg-background text-gray-800 antialiased min-h-screen flex flex-col justify-center py-12 sm:px-6 lg:px-8 relative overflow-hidden">
  
  <div class="sm:mx-auto sm:w-full sm:max-w-md z-10">
    <div class="flex justify-center mb-6">
      <div class="w-12 h-12 bg-primary-100 rounded-full flex items-center justify-center">
        <svg class="w-6 h-6 text-primary-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
      </div>
    </div>
    <h2 class="text-center text-3xl font-extrabold text-gray-900 tracking-tight">Forgot password?</h2>
    <p class="mt-2 text-center text-sm text-gray-600">
      No worries, we'll send you an OTP to reset it.
    </p>
  </div>

  <div class="mt-8 sm:mx-auto sm:w-full sm:max-w-md z-10">
    <div class="bg-white py-8 px-4 shadow-soft sm:rounded-2xl sm:px-10 border border-gray-100">
      <form id="forgotForm" class="space-y-6">
        <div>
          <label for="mobile" class="block text-sm font-medium text-gray-700">Registered Mobile Number</label>
          <div class="mt-1 relative rounded-md shadow-sm">
            <input id="mobile" name="mobile" type="tel" required class="appearance-none block w-full px-4 py-3 border border-gray-300 rounded-lg placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-primary-500 focus:border-transparent transition-all" placeholder="Enter your mobile">
          </div>
        </div>

        <div>
          <button type="submit" id="forgotBtn" class="w-full flex justify-center py-3 px-4 border border-transparent rounded-lg shadow-sm text-sm font-medium text-white bg-primary-600 hover:bg-primary-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary-500 transition-all">
            Send OTP via SMS
          </button>
        </div>
      </form>
      <div class="mt-4 text-center">
        <a href="/login.html" class="text-sm font-medium text-gray-500 hover:text-gray-900 flex items-center justify-center">
          <svg class="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
          Back to log in
        </a>
      </div>
      <div id="formMessage" class="hidden text-center mt-4"></div>
    </div>
  </div>

  <script src="/js/auth.js"></script>
</body>
</html>
