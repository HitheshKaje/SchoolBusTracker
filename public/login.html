<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In - RouteSense</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="/js/tailwind.config.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Inter', sans-serif;
    }

    .video-blur {
      filter: blur(4px) brightness(0.75);
      transform: scale(1.08);
    }
  </style>
</head>

<body
  class="bg-background text-gray-800 antialiased min-h-screen flex flex-col justify-center py-12 sm:px-6 lg:px-8 relative overflow-hidden">
  <video autoplay muted loop playsinline class="absolute inset-0 w-full h-full object-cover video-bg video-blur ">
    <source src="/videos/Bus.mp4" type="video/mp4">
  </video>

  <!-- Decorative background elements -->
  <div class="absolute -top-24 -left-24 w-96 h-96 bg-primary-100 rounded-full blur-3xl opacity-50 z-0"></div>
  <div class="absolute bottom-12 right-12 w-64 h-64 bg-blue-100 rounded-full blur-3xl opacity-50 z-0"></div>

  <div class="sm:mx-auto sm:w-full sm:max-w-md z-10">
    <div class="flex justify-center mb-6">
      <div class="w-12 h-12 bg-primary-600 rounded-xl flex items-center justify-center shadow-lg">
        <svg class="w-7 h-7 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M8 7h12m0 0l-4-4m4 4l-4 4m0 6H4m0 0l4 4m-4-4l4-4"></path>
        </svg>
      </div>
    </div>
    <h2 id="loginTitle" class="text-center text-3xl font-extrabold text-white tracking-tight drop-shadow-[0_4px_12px_rgba(0,0,0,0.9)]">
      Welcome back
    </h2>
    <p id="loginSubtitle" class="mt-2 text-center text-md text-gray-200">
      Or <a href="/register.html" class="font-medium text-primary-600 hover:text-primary-500 transition-colors">create a
        new organization account</a>
    </p>
  </div>

  <div class="mt-8 sm:mx-auto sm:w-full sm:max-w-md z-10">
    <div class="bg-white py-8 px-4 shadow-soft sm:rounded-2xl sm:px-10 border border-gray-100 relative">

      <form id="loginForm" class="space-y-6" autocomplete="on" method="POST" action="#">
        <div>
          <label for="mobile" class="block text-sm font-medium text-gray-700">Mobile Number</label>
          <div class="mt-1 relative rounded-md shadow-sm">
            <input id="mobile" name="mobile" type="tel" required autocomplete="username"
              class="appearance-none block w-full px-4 py-3 border border-gray-300 rounded-lg placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-primary-500 focus:border-transparent transition-all"
              placeholder="Enter your registered mobile">
          </div>
        </div>

        <div>
          <label for="password" class="block text-sm font-medium text-gray-700">Password</label>
          <div class="mt-1 relative rounded-md shadow-sm">
            <input id="password" name="password" type="password" required autocomplete="current-password"
              class="appearance-none block w-full px-4 py-3 border border-gray-300 rounded-lg placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-primary-500 focus:border-transparent transition-all"
              placeholder="••••••••">
          </div>
        </div>

        <div class="flex items-center justify-between">
          <div class="flex items-center">
            <input id="remember-me" name="remember-me" type="checkbox"
              class="h-4 w-4 text-primary-600 focus:ring-primary-500 border-gray-300 rounded">
            <label for="remember-me" class="ml-2 block text-sm text-gray-900">Remember me</label>
          </div>

          <div class="text-sm">
            <a href="/forgot-password.html"
              class="font-medium text-primary-600 hover:text-primary-500 transition-colors">Forgot your password?</a>
          </div>
        </div>

        <div>
          <button type="submit" id="loginBtn"
            class="w-full flex justify-center py-3 px-4 border border-transparent rounded-lg shadow-sm text-sm font-medium text-white bg-primary-600 hover:bg-primary-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary-500 transition-all">
            Sign In
          </button>
        </div>
      </form>
      <div id="formMessage" class="hidden text-center mt-4"></div>
    </div>
  </div>

  <script src="/js/auth.js"></script>
</body>

</html>
