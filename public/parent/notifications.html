<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Notifications - RouteSense</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { theme: { extend: { colors: { primary: { 50: '#eff6ff', 100: '#dbeafe', 200: '#bfdbfe', 300: '#93c5fd', 400: '#60a5fa', 500: '#3b82f6', 600: '#2563eb', 700: '#1d4ed8', 800: '#1e40af', 900: '#1e3a8a' } } } } }
  </script>
</head>
<body class="bg-gray-50 text-gray-800 font-sans antialiased overflow-hidden flex">
  <main id="main-content" class="flex-1 md:ml-64 h-screen overflow-y-auto w-full md:w-auto overflow-x-hidden">
    <div class="p-8 max-w-4xl mx-auto space-y-6">
      <h1 class="text-3xl font-bold text-gray-900 mb-6">Notifications</h1>
      <div id="notificationsContainer" class="space-y-4"></div>
      <div id="emptyState" class="hidden text-center py-12 bg-white rounded-2xl shadow-sm border border-gray-100">
        <p class="text-gray-500">No new notifications.</p>
      </div>
    </div>
  </main>
  <script src="/parent/layout.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      try {
        const response = await fetch('/api/parent-app/notifications', { headers: { 'Authorization': `Bearer ${localStorage.getItem('token')}` } });
        const data = await response.json();
        const container = document.getElementById('notificationsContainer');
        if (data.success && data.data.length > 0) {
          data.data.forEach(item => {
            container.innerHTML += `
              <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 hover:shadow-md transition-shadow relative">
                <h3 class="text-lg font-bold text-gray-900 mb-2">${item.title}</h3>
                <p class="text-gray-600 mb-4">${item.content || item.message}</p>
                <div class="flex items-center justify-between text-xs text-gray-400">
                  <span>${new Date(item.createdAt).toLocaleString()}</span>
                </div>
              </div>
            `;
          });
        } else {
          document.getElementById('emptyState').classList.remove('hidden');
        }
      } catch (e) {}
    });
  </script>
</body>
</html>
