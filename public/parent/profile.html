<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Profile - RouteSense</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { theme: { extend: { colors: { primary: { 50: '#eff6ff', 100: '#dbeafe', 200: '#bfdbfe', 300: '#93c5fd', 400: '#60a5fa', 500: '#3b82f6', 600: '#2563eb', 700: '#1d4ed8', 800: '#1e40af', 900: '#1e3a8a' } } } } }
  </script>
</head>
<body class="bg-gray-50 text-gray-800 font-sans antialiased overflow-hidden flex">
  <main id="main-content" class="flex-1 md:ml-64 h-screen overflow-y-auto w-full md:w-auto overflow-x-hidden">
    <div class="p-8 max-w-3xl mx-auto space-y-6">
      <h1 class="text-3xl font-bold text-gray-900 mb-6">My Profile</h1>
      <div class="bg-white p-8 rounded-2xl shadow-sm border border-gray-100">
        <form id="profileForm" class="space-y-6">
          <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1">Name</label>
              <input type="text" id="name" disabled class="w-full px-4 py-2 bg-gray-50 border border-gray-200 rounded-lg text-gray-500">
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1">Phone Number</label>
              <input type="text" id="mobile" disabled class="w-full px-4 py-2 bg-gray-50 border border-gray-200 rounded-lg text-gray-500">
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
              <input type="email" id="email" class="w-full px-4 py-2 border border-gray-200 rounded-lg focus:ring-2 focus:ring-primary-500 outline-none transition-shadow">
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1">Emergency Contact</label>
              <input type="text" id="emergencyContact" class="w-full px-4 py-2 border border-gray-200 rounded-lg focus:ring-2 focus:ring-primary-500 outline-none transition-shadow">
            </div>
            <div class="md:col-span-2">
              <label class="block text-sm font-medium text-gray-700 mb-1">Address</label>
              <textarea id="address" rows="3" class="w-full px-4 py-2 border border-gray-200 rounded-lg focus:ring-2 focus:ring-primary-500 outline-none transition-shadow"></textarea>
            </div>
            <div class="md:col-span-2">
              <label class="block text-sm font-medium text-gray-700 mb-1">New Password (leave blank to keep current)</label>
              <input type="password" id="password" class="w-full px-4 py-2 border border-gray-200 rounded-lg focus:ring-2 focus:ring-primary-500 outline-none transition-shadow">
            </div>
          </div>
          <div class="flex justify-end pt-4">
            <button type="submit" class="bg-primary-600 text-white px-6 py-2 rounded-lg hover:bg-primary-700 transition font-medium">Save Changes</button>
          </div>
        </form>
      </div>
    </div>
  </main>
  <script src="/parent/layout.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      const token = localStorage.getItem('token');
      try {
        const response = await fetch('/api/parent-app/profile', { headers: { 'Authorization': `Bearer ${token}` } });
        const data = await response.json();
        if (data.success) {
          const profile = data.data;
          document.getElementById('name').value = profile.user.name;
          document.getElementById('mobile').value = profile.user.mobile;
          document.getElementById('email').value = profile.user.email || '';
          document.getElementById('emergencyContact').value = profile.emergencyContact || '';
          document.getElementById('address').value = profile.address || '';
        }
      } catch (e) {}
    });

    document.getElementById('profileForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const emergencyContact = document.getElementById('emergencyContact').value;
      const address = document.getElementById('address').value;
      const password = document.getElementById('password').value;

      const body = { email, emergencyContact, address };
      if (password) body.password = password;

      try {
        const res = await fetch('/api/parent-app/profile', {
          method: 'PUT',
          headers: { 'Authorization': `Bearer ${localStorage.getItem('token')}`, 'Content-Type': 'application/json' },
          body: JSON.stringify(body)
        });
        const data = await res.json();
        if (data.success) {
          alert('Profile updated successfully');
          document.getElementById('password').value = '';
        } else {
          alert(data.message || 'Update failed');
        }
      } catch (e) {
        alert('Error updating profile');
      }
    });
  </script>
</body>
</html>
