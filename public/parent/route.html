<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Assigned Route - RouteSense</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { theme: { extend: { colors: { primary: { 50: '#eff6ff', 100: '#dbeafe', 200: '#bfdbfe', 300: '#93c5fd', 400: '#60a5fa', 500: '#3b82f6', 600: '#2563eb', 700: '#1d4ed8', 800: '#1e40af', 900: '#1e3a8a' } } } } }
  </script>
</head>
<body class="bg-gray-50 text-gray-800 font-sans antialiased overflow-hidden flex">
  <main id="main-content" class="flex-1 md:ml-64 h-screen overflow-y-auto w-full md:w-auto overflow-x-hidden">
    <div class="p-8 max-w-7xl mx-auto space-y-6">
      <h1 class="text-3xl font-bold text-gray-900 mb-6">Assigned Routes</h1>
      <div id="routeContainer" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
      <div id="emptyState" class="hidden text-center py-12 bg-white rounded-2xl shadow-sm border border-gray-100">
        <p class="text-gray-500">No routes assigned.</p>
      </div>
    </div>
  </main>
  <script src="/parent/layout.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      try {
        const response = await fetch('/api/parent-app/routes', { headers: { 'Authorization': `Bearer ${localStorage.getItem('token')}` } });
        const data = await response.json();
        const container = document.getElementById('routeContainer');
        if (data.success && data.data.length > 0) {
          data.data.forEach(route => {
            let stopsHtml = '';
            if (route.stops && route.stops.length > 0) {
              stopsHtml = route.stops.map((stop, idx) => `
                <div class="flex items-start">
                  <div class="flex flex-col items-center mr-3 mt-1">
                    <div class="w-2.5 h-2.5 rounded-full bg-primary-500"></div>
                    ${idx < route.stops.length - 1 ? '<div class="w-px h-full bg-gray-200 mt-1 mb-1 min-h-[1.5rem]"></div>' : ''}
                  </div>
                  <div class="pb-3 text-sm">
                    <p class="font-medium text-gray-800">${stop.name}</p>
                    ${stop.estimatedTime ? `<p class="text-xs text-gray-500">${stop.estimatedTime}</p>` : ''}
                  </div>
                </div>
              `).join('');
            } else {
              stopsHtml = '<p class="text-sm text-gray-500">No stops configured for this route.</p>';
            }

            container.innerHTML += `
              <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
                <div class="p-6 border-b border-gray-100 bg-gray-50">
                  <div class="flex justify-between items-start mb-2">
                    <h3 class="text-xl font-bold text-gray-900">${route.name}</h3>
                    <span class="px-2.5 py-0.5 rounded-full text-xs font-medium bg-green-100 text-green-800">${route.status || 'Active'}</span>
                  </div>
                  <p class="text-sm text-gray-500 mb-4">Route No: ${route.routeNumber}</p>
                  
                  <div class="flex items-center justify-between bg-white p-3 rounded-lg border border-gray-100 shadow-sm">
                     <div class="text-center flex-1">
                       <p class="text-[10px] font-bold text-primary-600 uppercase tracking-wider mb-1">From</p>
                       <p class="text-sm font-bold text-gray-900 truncate">${route.startPoint || 'Unknown'}</p>
                     </div>
                     <svg class="w-5 h-5 text-gray-400 mx-2 flex-none" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                     <div class="text-center flex-1">
                       <p class="text-[10px] font-bold text-primary-600 uppercase tracking-wider mb-1">To</p>
                       <p class="text-sm font-bold text-gray-900 truncate">${route.endPoint || 'Unknown'}</p>
                     </div>
                  </div>
                </div>
                
                <div class="p-6">
                  <div class="grid grid-cols-2 gap-4 mb-6 text-sm">
                    <div class="bg-gray-50 p-3 rounded-lg border border-gray-100">
                      <p class="text-xs text-gray-500 uppercase tracking-wider mb-1">Distance</p>
                      <p class="font-bold text-gray-800">${route.distance || 'N/A'}</p>
                    </div>
                    <div class="bg-gray-50 p-3 rounded-lg border border-gray-100">
                      <p class="text-xs text-gray-500 uppercase tracking-wider mb-1">ETA</p>
                      <p class="font-bold text-gray-800">${route.estimatedTime || 'N/A'}</p>
                    </div>
                  </div>
                  
                  <h4 class="text-sm font-bold text-gray-800 mb-4 flex items-center">
                    <svg class="w-4 h-4 text-gray-400 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.242-4.243a8 8 0 1111.314 0z"></path></svg>
                    Stops Sequence (${route.stops ? route.stops.length : 0})
                  </h4>
                  <div class="pl-2 h-64 overflow-y-auto pr-2">
                     ${stopsHtml}
                  </div>
                </div>
              </div>
            `;
          });
        } else {
          document.getElementById('emptyState').classList.remove('hidden');
        }
      } catch (e) {}
    });
  </script>
</body>
</html>
