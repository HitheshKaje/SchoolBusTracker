<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - RouteSense</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="/js/tailwind.config.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Inter', sans-serif;
    }

    .video-blur {
      filter: blur(4px) brightness(0.75);
      transform: scale(1.08);
    }
  </style>
</head>

<body
  class="bg-background text-gray-800 antialiased min-h-screen flex flex-col justify-center py-12 px-4 sm:px-6 lg:px-8 relative overflow-hidden">
  <a href="/index.html"
    class="fixed top-6 left-6 flex items-center gap-2 bg-white/20 backdrop-blur-md text-white px-5 py-2.5 rounded-full border border-white/30 hover:bg-white/30 transition-all shadow-lg z-50">

    <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" />
    </svg>

    Home
  </a>
  <video autoplay muted loop playsinline class="absolute inset-0 w-full h-full object-cover video-bg video-blur ">
    <source src="/videos/Bus.mp4" type="video/mp4">
  </video>

  <!-- Decorative background elements -->
  <div class="absolute -top-24 -left-24 w-96 h-96 bg-primary-100 rounded-full blur-3xl opacity-50 z-0"></div>
  <div class="absolute bottom-12 right-12 w-64 h-64 bg-blue-100 rounded-full blur-3xl opacity-50 z-0"></div>

  <div class="w-full sm:mx-auto sm:max-w-md z-10">
    <div class="flex justify-center mb-6">
      <div class="w-12 h-12 bg-primary-600 rounded-xl flex items-center justify-center shadow-lg">
        <svg class="w-7 h-7 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6"></path>
        </svg>
      </div>
    </div>
    <h2 class="text-center text-4xl font-bold text-gray-200 tracking-tight">Create an account</h2>
    <p class="mt-4 text-center text-md text-gray-200">
      Already have an account? <a href="/login.html"
        class="font-medium text-primary-600 hover:text-primary-500 transition-colors">Sign in here</a>
    </p>
  </div>

  <div class="mt-8 w-full sm:mx-auto sm:max-w-md z-10">
    <div class="bg-white py-8 px-4 shadow-soft sm:rounded-2xl sm:px-10 border border-gray-100 max-h-[calc(100vh-16rem)] overflow-y-auto">

      <form id="registerForm" class="space-y-5">
        <div>
          <label for="name" class="block text-sm font-medium text-gray-700">Full Name</label>
          <div class="mt-1">
            <input id="name" name="name" type="text" required
              class="appearance-none block w-full px-4 py-3 border border-gray-300 rounded-lg placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-primary-500 focus:border-transparent transition-all"
              placeholder="John Doe">
          </div>
        </div>

        <div>
          <label for="orgSearchInput" class="block text-sm font-medium text-gray-700">Full Organization Name</label>
          <div class="mt-1 relative">
            <input id="orgSearchInput" type="text" required
              class="appearance-none block w-full px-4 py-3 border border-gray-300 rounded-lg placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-primary-500 focus:border-transparent transition-all"
              placeholder="e.g. Vivekananda College" autocomplete="off">
            <!-- Autocomplete Dropdown -->
            <ul id="orgDropdown" class="absolute z-10 w-full mt-1 bg-white border border-gray-200 rounded-lg shadow-lg max-h-60 overflow-y-auto hidden">
            </ul>
          </div>
          <!-- Hidden inputs for form submission -->
          <input type="hidden" id="orgName" name="orgName">
          <input type="hidden" id="orgDisplayName" name="orgDisplayName">
          <input type="hidden" id="orgAddress" name="orgAddress">
          <input type="hidden" id="orgLat" name="orgLat">
          <input type="hidden" id="orgLon" name="orgLon">
          <input type="hidden" id="orgOsmId" name="orgOsmId">
        </div>

        <div>
          <label for="email" class="block text-sm font-medium text-gray-700">Email Address (Optional)</label>
          <div class="mt-1">
            <input id="email" name="email" type="email"
              class="appearance-none block w-full px-4 py-3 border border-gray-300 rounded-lg placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-primary-500 focus:border-transparent transition-all"
              placeholder="john@example.com">
          </div>
        </div>

        <div>
          <label for="mobile" class="block text-sm font-medium text-gray-700">Mobile Number</label>
          <div class="mt-1">
            <input id="mobile" name="mobile" type="tel" required
              class="appearance-none block w-full px-4 py-3 border border-gray-300 rounded-lg placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-primary-500 focus:border-transparent transition-all"
              placeholder="+1234567890">
          </div>
        </div>

        <div>
          <label for="role" class="block text-sm font-medium text-gray-700">Role</label>
          <div class="mt-1">
            <select id="role" name="role" required
              class="appearance-none block w-full px-4 py-3 border border-gray-300 rounded-lg bg-white focus:outline-none focus:ring-2 focus:ring-primary-500 focus:border-transparent transition-all">
              <option value="Admin">Admin (School/Organization)</option>
            </select>
          </div>
        </div>

        <div>
          <label for="password" class="block text-sm font-medium text-gray-700">Password</label>
          <div class="mt-1">
            <input id="password" name="password" type="password" required
              class="appearance-none block w-full px-4 py-3 border border-gray-300 rounded-lg placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-primary-500 focus:border-transparent transition-all"
              placeholder="••••••••">
          </div>
        </div>

        <div>
          <button type="submit" id="registerBtn"
            class="w-full flex justify-center py-3 px-4 border border-transparent rounded-lg shadow-sm text-sm font-medium text-white bg-primary-600 hover:bg-primary-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary-500 transition-all">
            Create Account
          </button>
        </div>
      </form>
      <div id="formMessage" class="hidden text-center mt-4"></div>
    </div>
  </div>

  <script src="/js/auth.js"></script>
</body>

</html>
