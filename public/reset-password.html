<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password - RouteSense</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="/js/tailwind.config.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Inter', sans-serif;
    }

    .video-blur {
      filter: blur(4px) brightness(0.75);
      transform: scale(1.08);
    }
  </style>
</head>

<body
  class="bg-background text-gray-800 antialiased min-h-screen flex flex-col justify-center py-12 sm:px-6 lg:px-8 relative overflow-hidden">
  <video autoplay muted loop playsinline class="absolute inset-0 w-full h-full object-cover video-bg video-blur ">
    <source src="/videos/Bus.mp4" type="video/mp4">
  </video>

  <div class="sm:mx-auto sm:w-full sm:max-w-md z-10">
    <div class="flex justify-center mb-6">
      <div class="w-12 h-12 bg-green-100 rounded-full flex items-center justify-center">
        <svg class="w-6 h-6 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z">
          </path>
        </svg>
      </div>
    </div>
    <h2 class="text-center text-3xl font-extrabold text-gray-100 tracking-tight">Set new password</h2>
    <p class="mt-2 text-center text-sm text-gray-300">
      Your new password must be different from previously used passwords.
    </p>
  </div>

  <div class="mt-8 sm:mx-auto sm:w-full sm:max-w-md z-10">
    <div class="bg-white py-8 px-4 shadow-soft sm:rounded-2xl sm:px-10 border border-gray-100">
      <form id="resetForm" class="space-y-6">
        <div>
          <label for="newPassword" class="block text-sm font-medium text-gray-700">New Password</label>
          <div class="mt-1">
            <input id="newPassword" name="newPassword" type="password" required
              class="appearance-none block w-full px-4 py-3 border border-gray-300 rounded-lg placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-primary-500 focus:border-transparent transition-all"
              placeholder="••••••••">
          </div>
        </div>

        <div>
          <label for="confirmPassword" class="block text-sm font-medium text-gray-700">Confirm Password</label>
          <div class="mt-1">
            <input id="confirmPassword" name="confirmPassword" type="password" required
              class="appearance-none block w-full px-4 py-3 border border-gray-300 rounded-lg placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-primary-500 focus:border-transparent transition-all"
              placeholder="••••••••">
          </div>
        </div>

        <div>
          <button type="submit" id="resetBtn"
            class="w-full flex justify-center py-3 px-4 border border-transparent rounded-lg shadow-sm text-sm font-medium text-white bg-primary-600 hover:bg-primary-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary-500 transition-all">
            Set New Password
          </button>
        </div>
      </form>
      <div id="formMessage" class="hidden text-center mt-4"></div>
    </div>
  </div>

  <script src="/js/auth.js"></script>
</body>

</html>
