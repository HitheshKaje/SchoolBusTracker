<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Verify OTP - RouteSense</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="/js/tailwind.config.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Inter', sans-serif;
    }

    .video-blur {
      filter: blur(4px) brightness(0.75);
      transform: scale(1.08);
    }
  </style>
</head>

<body
  class="bg-background text-gray-800 antialiased min-h-screen flex flex-col justify-center py-12 px-4 sm:px-6 lg:px-8 relative overflow-hidden">
  <video autoplay muted loop playsinline class="absolute inset-0 w-full h-full object-cover video-bg video-blur ">
    <source src="/videos/Bus.mp4" type="video/mp4">
  </video>

  <div class="w-full sm:mx-auto sm:max-w-md z-10">
    <div class="flex justify-center mb-6">
      <div class="w-12 h-12 bg-primary-100 rounded-full flex items-center justify-center">
        <svg class="w-6 h-6 text-primary-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M12 18h.01M8 21h8a2 2 0 002-2V5a2 2 0 00-2-2H8a2 2 0 00-2 2v14a2 2 0 002 2z"></path>
        </svg>
      </div>
    </div>
    <h2 class="text-center text-3xl font-extrabold text-gray-200 tracking-tight">Check your phone</h2>
    <p class="mt-2 text-center text-sm text-gray-200">
      We sent a 6-digit code to <span id="mobileDisplay" class="font-medium text-gray-200"></span>
    </p>
  </div>

  <div class="mt-8 w-full sm:mx-auto sm:max-w-md z-10">
    <div class="bg-white py-8 px-4 shadow-soft sm:rounded-2xl sm:px-10 border border-gray-100">
      <form id="otpForm" class="space-y-6">
        <div>
          <label class="block text-sm font-medium text-gray-700 text-center mb-4">Enter Verification Code</label>
          <div class="flex justify-center space-x-2">
            <input type="text" maxlength="1"
              class="otp-input w-12 h-14 text-center text-2xl font-semibold border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary-500 focus:border-transparent outline-none transition-all"
              required>
            <input type="text" maxlength="1"
              class="otp-input w-12 h-14 text-center text-2xl font-semibold border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary-500 focus:border-transparent outline-none transition-all"
              required>
            <input type="text" maxlength="1"
              class="otp-input w-12 h-14 text-center text-2xl font-semibold border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary-500 focus:border-transparent outline-none transition-all"
              required>
            <input type="text" maxlength="1"
              class="otp-input w-12 h-14 text-center text-2xl font-semibold border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary-500 focus:border-transparent outline-none transition-all"
              required>
            <input type="text" maxlength="1"
              class="otp-input w-12 h-14 text-center text-2xl font-semibold border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary-500 focus:border-transparent outline-none transition-all"
              required>
            <input type="text" maxlength="1"
              class="otp-input w-12 h-14 text-center text-2xl font-semibold border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary-500 focus:border-transparent outline-none transition-all"
              required>
          </div>
        </div>

        <div>
          <button type="submit" id="verifyBtn"
            class="w-full flex justify-center py-3 px-4 border border-transparent rounded-lg shadow-sm text-sm font-medium text-white bg-primary-600 hover:bg-primary-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary-500 transition-all">
            Verify OTP
          </button>
        </div>
      </form>
      <div class="mt-6 text-center">
        <p class="text-sm text-gray-600">Didn't receive the code? <button id="resendBtn" type="button"
            class="font-medium text-primary-600 hover:text-primary-500">
            Resend
          </button></p>
      </div>
      <div id="formMessage" class="hidden text-center mt-4"></div>
    </div>
  </div>

  <script src="/js/auth.js"></script>
</body>

</html>
